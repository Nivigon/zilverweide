<!DOCTYPE html>
<html lang="nl"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vleespen-lockpick — integratie-test</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════════════════════════════
   LOCKPICK-ENGINE — Styling.  Prefix "lp-". Zilverweide-tokens.
   ════════════════════════════════════════════════════════════════════ */

:root {
  --gold: #c9a84c; --gold-dim: #8a6f32; --parchment: #f5ead6; --mist: #c8bfaf;
  --blood: #8b1a1a; --rose: #9b3a4a; --ash: #3d3228; --ink: #1a1208;
  --goed: #6fae6f; --laag: #6c84a8; --hoog: #b5322b; --staal: #c9c2b4;
}

.lp-root { font-family: 'Crimson Text', Georgia, serif; color: var(--parchment); }
.lp-screen { display: none; animation: lp-fadeIn .6s ease; }
.lp-screen.lp-active { display: block; }
@keyframes lp-fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* Header */
.lp-header { display: flex; align-items: center; gap: .75rem; margin: 0 0 .5rem; }
.lp-back-btn { background: none; border: none; color: var(--gold-dim); font-family: 'Cinzel', serif; font-size: .8rem; letter-spacing: .12em; cursor: pointer; padding: .25rem .5rem .25rem 0; text-transform: uppercase; }
.lp-back-btn:hover { color: var(--gold); }
.lp-header-sep { flex: 1; height: 1px; background: linear-gradient(to right, rgba(201,168,76,.3), transparent); }
.lp-titel-compact { font-family: 'Cinzel', serif; font-weight: 600; font-size: clamp(1.5rem,4vw,2.2rem); color: var(--gold); letter-spacing: .08em; text-align: center; text-shadow: 0 0 30px rgba(201,168,76,.35); margin: .25rem 0; }
.lp-sub-onder-titel { font-family: 'Cinzel', serif; font-size: .8rem; letter-spacing: .2em; color: var(--gold-dim); text-transform: uppercase; text-align: center; margin: 0 0 .5rem; }

/* Knoppen */
.lp-btn { display: inline-block; font-family: 'Cinzel', serif; font-size: .9rem; letter-spacing: .12em; padding: .8rem 2rem; border: 1px solid var(--gold-dim); background: transparent; color: var(--gold); cursor: pointer; transition: all .2s; border-radius: 2px; text-transform: uppercase; }
.lp-btn:hover { background: rgba(201,168,76,.1); border-color: var(--gold); }
.lp-btn-full { display: block; width: 100%; text-align: center; margin-top: 1rem; }

.lp-scene-image { width: 100%; aspect-ratio: 16/9; max-height: 42vh; background: #000 center/cover no-repeat; border: 1px solid rgba(201,168,76,.2); border-radius: 4px; margin: .5rem 0 .75rem; position: relative; overflow: hidden; }
.lp-scene-image.lp-scene-leeg { background: radial-gradient(ellipse at 50% 30%, rgba(201,168,76,.05), transparent 55%), linear-gradient(180deg, #14100a 0%, #0b0805 100%); }

/* Reeks-label + timer */
.lp-toprij { display: flex; align-items: center; justify-content: space-between; gap: 1rem; margin: 0 0 .5rem; min-height: 26px; }
.lp-reeks-label { font-family: 'Cinzel', serif; font-size: .7rem; letter-spacing: .12em; text-transform: uppercase; color: var(--gold-dim); }
.lp-reeks-label strong { color: var(--gold); }
.lp-reeks-naam { color: var(--mist); font-style: italic; text-transform: none; letter-spacing: 0; font-family: 'Crimson Text', serif; }
.lp-timer { display: none; align-items: center; gap: .5rem; }
.lp-diehard .lp-timer { display: flex; }
.lp-timer-num { font-family: 'Cinzel', serif; font-size: .85rem; letter-spacing: .08em; color: var(--gold); min-width: 2.6em; text-align: right; }
.lp-timer-balk { width: 90px; height: 6px; background: rgba(0,0,0,.5); border: 1px solid rgba(201,168,76,.25); border-radius: 3px; overflow: hidden; }
.lp-timer-vul { height: 100%; width: 100%; background: var(--goed); transition: width .15s linear, background .3s; }
.lp-timer.lp-timer-laag .lp-timer-num { color: var(--hoog); animation: lp-pols 1s ease-in-out infinite; }
.lp-timer.lp-timer-laag .lp-timer-vul { background: var(--hoog); }
@keyframes lp-pols { 0%,100% { opacity: 1; } 50% { opacity: .45; } }

/* Het slot (doorsnede) */
.lp-slot { position: relative; width: 100%; max-width: 460px; margin: 3.2rem auto 1rem; height: 190px;
  border: 1px solid rgba(201,168,76,.25); border-radius: 6px; overflow: visible;
  background: linear-gradient(180deg, #201811 0%, #17110b 60%, #100b07 100%);
  box-shadow: 0 0 30px rgba(0,0,0,.6) inset; }
.lp-slot.lp-klem-mode { box-shadow: 0 0 40px rgba(139,26,26,.5) inset; animation: lp-shake .4s ease; }
.lp-slot.lp-slot-open { box-shadow: 0 0 40px rgba(111,174,111,.4) inset; }
@keyframes lp-shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

/* Pin-kolommen */
.lp-tracks { position: absolute; left: 0; right: 0; top: 8px; bottom: 42px; display: flex; gap: 8px; padding: 0 16px; z-index: 2; }
.lp-track { position: relative; flex: 1; border-left: 1px dashed rgba(201,168,76,.12); border-right: 1px dashed rgba(201,168,76,.12); }
.lp-track.lp-actief { background: rgba(201,168,76,.05); }
.lp-band { position: absolute; left: 2px; right: 2px; background: rgba(111,174,111,.28); border-top: 1px solid rgba(111,174,111,.5); border-bottom: 1px solid rgba(111,174,111,.5); border-radius: 2px; }
.lp-tick { position: absolute; left: 0; right: 0; height: 1px; background: rgba(245,234,214,.55); }
.lp-track:not(.lp-actief) .lp-band, .lp-track:not(.lp-actief) .lp-tick { opacity: 0; }
.lp-zonder-zone .lp-band, .lp-zonder-zone .lp-tick { display: none; }

.lp-pin { position: absolute; left: 50%; transform: translateX(-50%); bottom: 0; width: 14px; height: 26px;
  border-radius: 4px 4px 2px 2px; background: linear-gradient(180deg, var(--staal), #6d675b);
  box-shadow: 0 1px 3px rgba(0,0,0,.6); transition: bottom .04s linear; }
.lp-track.lp-actief .lp-pin { background: linear-gradient(180deg, #e9e2d2, #9c9484); }
.lp-pin.lp-gezet { background: linear-gradient(180deg, var(--gold), var(--gold-dim)); box-shadow: 0 0 10px rgba(201,168,76,.6); transition: bottom .12s cubic-bezier(.2,.9,.3,1.4); }

/* Schaarlijn-decor (het niveau waarop pinnen 'klikken') */
.lp-schaar { position: absolute; left: 8px; right: 8px; top: 50%; height: 1px; background: repeating-linear-gradient(90deg, rgba(201,168,76,.25) 0 6px, transparent 6px 12px); z-index: 1; }

/* De vleeshaak */
.lp-feel { position: absolute; left: calc(100% + 20px); width: 620px; height: 200px; z-index: 30; pointer-events: none; }
.lp-feel-keyhole { position: absolute; left: 8px; top: calc(50% - 82px); width: 88px; height: 164px; z-index: 1;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,.6)); }
.lp-feel-keyhole svg { width: 100%; height: 100%; display: block; }
.lp-feel-pen { position: absolute; left: 30px; top: calc(50% - 78px); width: calc(100% - 30px); height: 120px; z-index: 2;
  transform-origin: left center; animation: lp-sway 3.6s ease-in-out infinite; }
.lp-feel-pen svg { width: 100%; height: auto; display: block; }
.lp-feel-hole { position: absolute; left: 8px; top: calc(50% - 82px); width: 88px; height: 164px; z-index: 3; }
.lp-feel-hole svg { width: 100%; height: 100%; display: block; }
@keyframes lp-sway {
  0%   { transform: translate(0,0) rotate(0deg); }
  22%  { transform: translate(calc(var(--lp-amp,4) * 0.25px), calc(var(--lp-amp,4) * -0.5px)) rotate(calc(var(--lp-amp,4) * -0.1deg)); }
  46%  { transform: translate(calc(var(--lp-amp,4) * -0.2px), calc(var(--lp-amp,4) * 0.4px)) rotate(calc(var(--lp-amp,4) * 0.12deg)); }
  70%  { transform: translate(calc(var(--lp-amp,4) * 0.2px), calc(var(--lp-amp,4) * 0.22px)) rotate(calc(var(--lp-amp,4) * -0.08deg)); }
  100% { transform: translate(0,0) rotate(0deg); }
}

/* Sleutelgat-decor onderaan */
.lp-keyway { position: absolute; left: 0; right: 0; bottom: 0; height: 40px; z-index: 1;
  background: linear-gradient(180deg, rgba(0,0,0,.2), rgba(0,0,0,.55));
  border-top: 1px solid rgba(201,168,76,.15); }
.lp-keyway::after { content: ''; position: absolute; left: 50%; bottom: 8px; transform: translateX(-50%); width: 10px; height: 22px; background: #000; border-radius: 5px 5px 0 0; box-shadow: 0 0 8px rgba(0,0,0,.8); }

.lp-slot.lp-flash-goed { animation: lp-flashGoed .4s ease; }
.lp-slot.lp-flash-laag { animation: lp-flashLaag .3s ease; }
@keyframes lp-flashGoed { 40% { box-shadow: 0 0 30px rgba(111,174,111,.6) inset; } }
@keyframes lp-flashLaag { 50% { transform: translateY(2px); } }

/* Pin-patroon (clue-rij) */
.lp-mini-label { text-align: center; font-family: 'Cinzel', serif; font-size: .65rem; letter-spacing: .2em; text-transform: uppercase; color: var(--gold-dim); margin: 0 0 .4rem; }
.lp-patroon { display: flex; justify-content: center; align-items: flex-end; gap: 4px; height: 40px; max-width: 320px; margin: 0 auto 1rem; padding: 4px; border-bottom: 1px solid rgba(201,168,76,.2); }
.lp-prof-kolom { flex: 1; max-width: 30px; height: 100%; display: flex; align-items: flex-end; background: rgba(201,168,76,.04); border: 1px solid rgba(201,168,76,.12); border-radius: 2px; transition: all .25s; }
.lp-prof-vul { width: 100%; background: var(--gold-dim); border-radius: 1px; transition: height .25s ease, background .25s; }
.lp-prof-kolom.lp-actief { border-color: var(--gold); box-shadow: 0 0 10px rgba(201,168,76,.4); }
.lp-prof-kolom.lp-actief .lp-prof-vul { background: var(--gold); }
.lp-prof-kolom.lp-klaar .lp-prof-vul { background: var(--goed); }

/* Status */
.lp-status { text-align: center; font-family: 'Cinzel', serif; font-size: .78rem; letter-spacing: .1em; text-transform: uppercase; color: var(--gold-dim); margin: 0 0 .7rem; min-height: 1.1em; transition: color .3s; }
.lp-naam { color: var(--gold); }
.lp-status.lp-klem-mode { color: var(--blood); }
.lp-klem-tekst { font-family: 'Crimson Text', Georgia, serif; font-style: italic; font-size: 1rem; letter-spacing: .02em; text-transform: none; text-shadow: 0 0 12px rgba(139,26,26,.5); }
.lp-status.lp-goed-mode { color: #9dd49d; }
.lp-goed-tekst { font-family: 'Crimson Text', Georgia, serif; font-style: italic; font-size: 1rem; letter-spacing: .02em; text-transform: none; text-shadow: 0 0 12px rgba(125,191,125,.4); }

/* Zet-knop */
.lp-zet-btn { display: flex; align-items: center; justify-content: center; gap: .6rem; width: 100%; max-width: 380px; margin: 0 auto; padding: .95rem 1rem; font-family: 'Cinzel', serif; font-size: 1rem; letter-spacing: .12em; text-transform: uppercase; border: 1px solid var(--gold-dim); background: rgba(201,168,76,.05); color: var(--gold); cursor: pointer; border-radius: 2px; transition: all .2s; }
.lp-zet-btn:hover { background: rgba(201,168,76,.12); border-color: var(--gold); }
.lp-zet-btn:active { transform: scale(.97); }
.lp-zet-icon { font-size: 1.3rem; }
.lp-hint { text-align: center; font-style: italic; color: var(--mist); opacity: .7; font-size: .9rem; margin: .85rem 0 0; }

/* Win */
.lp-win-block { background: rgba(125,191,125,.06); border: 1px solid rgba(125,191,125,.3); border-radius: 4px; padding: 1.75rem; margin: 1.5rem 0; text-align: center; }
.lp-win-icoon { font-size: 2.4rem; margin-bottom: .5rem; }
.lp-win-block h2 { font-family: 'Cinzel', serif; color: #9dd49d; font-size: 1.4rem; letter-spacing: .1em; margin: .25rem 0 .75rem; }
.lp-win-block p { font-style: italic; color: var(--mist); margin: 0; }

/* Keuzescherm */
.lp-kies-vraag { text-align: center; font-family: 'Cinzel', serif; font-size: .8rem; letter-spacing: .18em; text-transform: uppercase; color: var(--gold-dim); margin: 1.25rem 0 1rem; }
.lp-kies-wrap { display: flex; flex-direction: column; gap: .75rem; max-width: 380px; margin: 0 auto; }
.lp-kies-btn { display: flex; flex-direction: column; gap: .25rem; text-align: left; padding: 1rem 1.25rem; cursor: pointer; border-radius: 3px; border: 1px solid var(--gold-dim); background: rgba(201,168,76,.05); transition: all .2s; }
.lp-kies-btn:hover { background: rgba(201,168,76,.12); border-color: var(--gold); transform: translateY(-1px); }
.lp-kies-label { font-family: 'Cinzel', serif; font-size: 1.05rem; letter-spacing: .12em; text-transform: uppercase; color: var(--gold); }
.lp-kies-desc { font-style: italic; font-size: .92rem; color: var(--mist); }
.lp-kies-btn-hard { border-color: rgba(155,58,74,.5); }
.lp-kies-btn-hard:hover { border-color: var(--rose); background: rgba(155,58,74,.1); }
.lp-kies-btn-hard .lp-kies-label { color: var(--rose); }

/* Muziek + debug */
.lp-music-toggle { position: fixed; top: 1rem; right: 1rem; z-index: 300; width: 36px; height: 36px; background: rgba(13,10,6,.7); border: 1px solid rgba(201,168,76,.25); border-radius: 50%; color: var(--gold); font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: .6; }
.lp-music-toggle:hover { opacity: 1; border-color: var(--gold); }
.lp-music-toggle.lp-muted { color: var(--gold-dim); opacity: .4; }
.lp-debug { position: fixed; bottom: .6rem; right: .6rem; z-index: 300; font-family: 'Cinzel', serif; font-size: .65rem; letter-spacing: .08em; color: var(--gold-dim); background: rgba(13,10,6,.7); padding: .25rem .6rem; border: 1px solid rgba(201,168,76,.15); border-radius: 2px; opacity: .6; pointer-events: none; }

/* Dialoog */
.lp-dialog { display: flex; align-items: stretch; height: 110px; margin: 0 0 1rem; background: rgba(13,10,6,.55); border: 1px solid rgba(201,168,76,.25); border-radius: 4px; overflow: hidden; animation: lp-dialogIn .35s ease; }
@keyframes lp-dialogIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.lp-dialog-body { flex: 1; padding: .85rem 1.1rem .9rem; display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
.lp-dialog-spreker { font-family: 'Cinzel', serif; font-size: .7rem; letter-spacing: .22em; color: var(--gold); text-transform: uppercase; margin-bottom: .35rem; opacity: .9; }
.lp-dialog-tekst { font-style: italic; font-size: 1.02rem; line-height: 1.55; color: var(--parchment); animation: lp-textIn .25s ease; }
@keyframes lp-textIn { from { opacity: 0; } to { opacity: 1; } }
.lp-dialog-verder { flex: 0 0 auto; width: 56px; border: none; border-left: 1px solid rgba(201,168,76,.25); background: linear-gradient(180deg, rgba(201,168,76,.06), rgba(201,168,76,.12) 50%, rgba(201,168,76,.06)); color: var(--gold); cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: .15rem; }
.lp-dialog-verder:hover { color: var(--parchment); }
.lp-verder-ornament { font-size: 1.3rem; animation: lp-verderPulse 1.6s ease-in-out infinite; }
.lp-verder-label { font-size: .55rem; letter-spacing: .2em; text-transform: uppercase; opacity: .75; }
@keyframes lp-verderPulse { 0%,100% { opacity: .65; } 50% { opacity: 1; } }


/* ─── Volume-paneel (linksonder) ─── */
.lp-vol-paneel { position: fixed; bottom: .6rem; left: .6rem; z-index: 320; width: 190px;
  background: rgba(13,10,6,.82); border: 1px solid rgba(201,168,76,.22); border-radius: 4px;
  padding: .5rem .6rem .6rem; backdrop-filter: blur(2px); }
.lp-vol-titel { font-family: 'Cinzel', serif; font-size: .58rem; letter-spacing: .2em; text-transform: uppercase;
  color: var(--gold-dim); margin: 0 0 .4rem; }
.lp-vol-rij { display: flex; align-items: center; gap: .5rem; margin: .25rem 0; }
.lp-vol-label { font-family: 'Cinzel', serif; font-size: .6rem; letter-spacing: .08em; text-transform: uppercase;
  color: var(--mist); width: 34px; flex-shrink: 0; }
.lp-vol-slider { flex: 1; -webkit-appearance: none; appearance: none; height: 4px; border-radius: 2px;
  background: rgba(201,168,76,.25); outline: none; cursor: pointer; }
.lp-vol-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 13px; height: 13px;
  border-radius: 50%; background: var(--gold); border: 1px solid var(--gold-dim); cursor: pointer; box-shadow: 0 0 6px rgba(201,168,76,.5); }
.lp-vol-slider::-moz-range-thumb { width: 13px; height: 13px; border-radius: 50%; background: var(--gold);
  border: 1px solid var(--gold-dim); cursor: pointer; }


/* interval-rij onder een geluid */
.lp-int-rij { margin-top: 0; margin-bottom: .35rem; opacity: .9; }
.lp-int-rij .lp-vol-label { font-style: italic; text-transform: none; letter-spacing: 0; font-family: 'Crimson Text', serif; font-size: .68rem; color: var(--gold-dim); }
.lp-int-uit { font-family: 'Cinzel', serif; font-size: .58rem; color: var(--gold); width: 30px; text-align: right; flex-shrink: 0; }

/* positioneringscontext voor de first-person haak-overlay */
.lp-screen { position: relative; }


/* ─── Test-paneel: haak-beweging ─── */
.lp-test-paneel { position: fixed; bottom: 11.5rem; left: .6rem; z-index: 320; width: 190px;
  background: rgba(13,10,6,.82); border: 1px solid rgba(201,168,76,.22); border-radius: 4px;
  padding: .5rem .6rem .55rem; backdrop-filter: blur(2px); }
.lp-test-uit { font-family: 'Cinzel', serif; font-size: .6rem; color: var(--gold); width: 20px; text-align: right; flex-shrink: 0; }


/* ─── Fouten-indicator (links van de puzzel) ─── */
.lp-fouten { position: absolute; display: flex; flex-direction: column; align-items: center; gap: 7px; z-index: 20; }
.lp-fout-label { font-family: 'Cinzel', serif; font-size: .5rem; letter-spacing: .12em; text-transform: uppercase; color: var(--gold-dim); margin-bottom: 2px; }
.lp-fout-dot { width: 14px; height: 14px; border-radius: 50%; border: 1px solid var(--gold-dim); background: rgba(201,168,76,.05); transition: all .3s; }
.lp-fout-dot.lp-vol { background: var(--blood); border-color: var(--blood); box-shadow: 0 0 9px rgba(139,26,26,.7); }

body { margin:0; min-height:100vh; background: radial-gradient(ellipse at 50% 0%, #1c150c, #0b0805 70%);
  color: var(--parchment); font-family:'Crimson Text',Georgia,serif; display:flex; justify-content:center; padding:1.25rem 1rem 5rem; }
.wrap { width:100%; max-width:540px; }
.demo-bar { display:flex; align-items:center; border-bottom:1px solid rgba(201,168,76,.18); padding-bottom:.6rem; margin-bottom:1rem; }
.demo-bar .tag { font-family:'Cinzel',serif; font-size:.62rem; letter-spacing:.2em; color:var(--gold-dim); text-transform:uppercase; }
.demo-reset { display:block; margin:1.5rem auto 0; font-family:'Cinzel',serif; font-size:.72rem; letter-spacing:.15em; text-transform:uppercase; color:var(--gold-dim); background:none; border:1px solid rgba(201,168,76,.2); border-radius:2px; padding:.5rem 1.2rem; cursor:pointer; }
.demo-reset:hover { color:var(--gold); border-color:var(--gold); }
</style></head>

  <div id="mount"></div>
  <button class="demo-reset" onclick="startDemo()">↺ Opnieuw</button>

<script>
/* ════════════════════════════════════════════════════════════════════
   LOCKPICK-ENGINE  (timing-variant, afgeleid van de slijp-mechanic)
   Je peutert een slot open met een dunne vleeshaak. Elke pin moet op de
   schaarlijn gezet worden. De haak beweegt op en neer over de pin-hoogte;
   tik 'Zet' op het juiste moment.
       te LAAG  → de pin valt terug, opnieuw
       juist    → de pin klikt vast op de schaar, door naar de volgende
       te HOOG  → de pin klemt, alle pinnen vallen → terug naar pin 1

   De pin-hoogten samen zijn het slot-patroon (deelbaar, zoals de doolhof-
   route). Drie modi via kiesModus:true:
       makkelijk — schaarzone zichtbaar, geen tijd
       moeilijk  — geen zone (voel/lees de pinnen), geen tijd
       diehard   — geen zone + 30s per slot; klemmen óf tijd op = fout;
                   3 fouten → alles opnieuw

   CONFIG
   ──────
     reeks: [ { pins:[..0..1], band, snelheid, label }, ... ]
     dieHard: { tijd:30000, maxFouten:3 }
     straf: 'slot' | 'pin'
     images, teksten
   ════════════════════════════════════════════════════════════════════ */

(function (global) {
  'use strict';

  function el(tag, attrs, kids) {
    var e = document.createElement(tag);
    if (attrs) Object.keys(attrs).forEach(function (k) {
      if (k === 'class')            e.className = attrs[k];
      else if (k === 'html')        e.innerHTML = attrs[k];
      else if (k === 'text')        e.textContent = attrs[k];
      else if (k === 'style')       Object.assign(e.style, attrs[k]);
      else if (k.indexOf('on') === 0) e.addEventListener(k.slice(2), attrs[k]);
      else                          e.setAttribute(k, attrs[k]);
    });
    if (kids) kids.forEach(function (k) { if (k) e.appendChild(k); });
    return e;
  }
  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  var KEYHOLE_SVG =   // gouden plaat met sleutelgat
    '<svg viewBox="0 0 110 170" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">' +
      '<defs><linearGradient id="lp-plaat" x1="0" y1="0" x2="0" y2="1">' +
        '<stop offset="0" stop-color="#e0c476"/><stop offset=".5" stop-color="#b7963f"/>' +

  function Lockpick(opts) {

    this.config = opts.config;

    this.audioCfg = Object.assign({}, opts.audio || this.config.audio || {});
    this._vol = Object.assign({ drops: 0.5, mes: 0.5, whistle: 0.5, klik: 0.85 }, opts.volumes || {});
    this._interval = Object.assign({ drops: 5000, mes: 8000 }, opts.intervals || this.config.intervals || {});

    this.compactHeader = !!opts.compactHeader;
    this.kiesModus  = !!opts.kiesModus;

      : [{ pins: cfg.pins || [0.4, 0.7, 0.5], band: cfg.band, snelheid: cfg.snelheid, label: cfg.label }];
    this._straf = cfg.straf || 'slot';
    this._dh = Object.assign({ tijd: 30000, maxFouten: 3 }, cfg.dieHard || {});

    this._pins     = this._reeks[0].pins.slice();
    this._band     = this._reeks[0].band || 0.13;
    this._snelheid = this._reeks[0].snelheid || 1500;

    this.modus = opts.modus || 'makkelijk';
    this._pasModusAf();

  // ─── Build UI ───────────────────────────────────────────────────

      el('div', { class: 'lp-timer' }, [

    spelScreen.appendChild(el('div', { class: 'lp-mini-label', text: 'De pinnen:' }));

    var winScreen = el('section', { class: 'lp-screen' });

    winScreen.appendChild(el('div', { class: 'lp-win-block' }, [
      el('div', { class: 'lp-win-icoon', text: '🗝' }),

        } });

        el('div', { class: 'lp-vol-titel', text: 'Test · haak-beweging' }),

    this.container.appendChild(root);

    this._nodes.root = root;
    this._nodes.screens = { start: startScreen, spel: spelScreen, win: winScreen };

  // ─── Flow ────────────────────────────────────────────────────────
  Lockpick.prototype.start = function () {
    this._state.fouten = 0;
    this._laadSlot(0);
    this._toonScreen('spel');
    this._updateFouten(); this._plaatsSfeer();
    if (!this._resizeH) { var self = this; this._resizeH = function () { self._plaatsSfeer(); }; window.addEventListener('resize', this._resizeH); }
    this._startMuziek();
    this._startGeluid();
    this._startLoop();
  };
  Lockpick.prototype.destroy = function () {
    this._stopLoop(); clearTimeout(this._timer); this._stopAudio();
    if (this._resizeH) { window.removeEventListener('resize', this._resizeH); this._resizeH = null; }
    if (this._nodes.audio) { try { this._nodes.audio.pause(); } catch (e) {} }
    if (this._nodes.root && this._nodes.root.parentNode) this._nodes.root.parentNode.removeChild(this._nodes.root);
    this._nodes = {};
  };

  // ─── Spelersactie: pin zetten op de huidige haak-hoogte ───────────
  Lockpick.prototype.zet = function () {
    var s = this._state; if (s.bevroren) return;
    var pos = this._pos();
    var doel = this._pins[s.pinIdx];
    var lo = clamp(doel - this._band / 2, 0, 1), hi = clamp(doel + this._band / 2, 0, 1);
    if (pos > hi)      this._klemt();                 // te hoog → klemt
    else if (pos < lo) this._teLaag();                // te laag → opnieuw
    else {                                            // juist → pin gezet
      s.gezet[s.pinIdx] = doel;
      this._klik();
      this._zetToken(s.pinIdx, doel, true);
      this._bouwPinnen(); this._flash('goed');
      s.pinIdx++;
      if (s.pinIdx >= this._pins.length) { this._slotOpen(); return; }
      this._zetActieveZone();
    }
  };

  // ─── Loop + timer ────────────────────────────────────────────────
  Lockpick.prototype._startLoop = function () {
    if (this._state.lopend) return; this._state.lopend = true; var self = this;
    (function frame() { if (!self._state.lopend) return; self._tick(); self._raf = requestAnimationFrame(frame); })();
  };
  Lockpick.prototype._stopLoop = function () { this._state.lopend = false; if (this._raf) cancelAnimationFrame(this._raf); this._raf = null; };
  Lockpick.prototype._tick = function () {
    var s = this._state; if (s.bevroren) return;
    var now = performance.now();
    var pos = ((now - s.cycleStart) % this._snelheid) / this._snelheid;
    this._updateActief(pos);
    if (this.dieHard) {
      var rest = Math.max(0, s.deadline - now), sec = Math.ceil(rest / 1000);
      if (this._nodes.timerNum) this._nodes.timerNum.textContent = '0:' + (sec < 10 ? '0' : '') + sec;
      if (this._nodes.timerVul) this._nodes.timerVul.style.width = (rest / this._dh.tijd * 100) + '%';
      if (this._nodes.timer) this._nodes.timer.classList.toggle('lp-timer-laag', sec <= 10);
      if (rest <= 0) { this._fout('tijd'); return; }
    }
    if (this._nodes.debug) this._nodes.debug.textContent =
      'slot ' + (s.slotIdx + 1) + '/' + this._reeks.length + ' · pin ' + (s.pinIdx + 1) + '/' + this._pins.length +
      ' · ' + pos.toFixed(2) + (this.dieHard ? (' · fout ' + s.fouten) : '');
  };
  Lockpick.prototype._pos = function () { return ((performance.now() - this._state.cycleStart) % this._snelheid) / this._snelheid; };

  // ─── Uitkomsten ──────────────────────────────────────────────────
  Lockpick.prototype._teLaag = function () {
    var t = this.config.teksten || {};
    this._flash('laag'); this._tijdelijkeStatus(t.teLaag || 'Te laag — de pin valt terug.');
  };
  Lockpick.prototype._klemt = function () {
    if (this.dieHard) { this._fout('klem'); return; }
    var self = this, s = this._state, t = this.config.teksten || {};
    s.fouten++; try { this.onMislukt(s.fouten); } catch (e) {}
    this._updateFouten();
    var laatste = s.fouten >= this._dh.maxFouten;
    this._overlay(laatste ? (t.allesOpnieuw || 'Drie fouten. Alle sloten weer dicht — begin opnieuw.')
                          : (t.teHoog || 'Te hoog! De pin klemt en alle pinnen vallen.'));
    this._timer = setTimeout(function () {
      if (laatste) {
        s.fouten = 0; self._laadSlot(0); self._herstelVisueel(); self._updateFouten();
      } else if (self._straf === 'pin') {
        s.gezet[s.pinIdx] = null; self._herstel();
      } else {
        s.pinIdx = 0; s.gezet = self._pins.map(function () { return null; }); self._herstel();
      }
    }, 2100);
  };
  Lockpick.prototype._fout = function (reden) {
    var self = this, s = this._state, t = this.config.teksten || {};
    s.fouten++; try { this.onMislukt(s.fouten); } catch (e) {}
    this._updateFouten();
    var melding = reden === 'tijd' ? (t.tijdOp || 'De tijd is op — je hand verkrampt.')
                                   : (t.teHoog || 'Te hoog! De pin klemt en alles valt.');
    var laatste = s.fouten >= this._dh.maxFouten;
    if (laatste) melding = (t.allesOpnieuw || 'Drie fouten. Alle sloten weer op slot.');
    this._overlay(melding);
    this._timer = setTimeout(function () {
      if (laatste) { s.fouten = 0; self._laadSlot(0); } else { self._laadSlot(s.slotIdx); }
      self._herstelVisueel();
    }, 2100);
  };

  Lockpick.prototype._slotOpen = function () {
    var self = this, s = this._state, t = this.config.teksten || {};
    try { this.onVoltooid(s.slotIdx, this._reeks.length); } catch (e) {}
    if (s.slotIdx >= this._reeks.length - 1) { this._winnen(); return; }
    s.bevroren = true;
    var label = this._reeks[s.slotIdx].label || ('Slot ' + (s.slotIdx + 1));
    this._nodes.status.classList.add('lp-goed-mode');
    this._nodes.status.innerHTML = '<span class="lp-goed-tekst">✦ ' + label + ' open — volgende slot</span>';
    this._nodes.slot.classList.add('lp-slot-open');
    this._timer = setTimeout(function () {

  // ─── Overlay / herstel ───────────────────────────────────────────

  };
  Lockpick.prototype._herstelVisueel = function () {
    var t = this.config.teksten || {};

    this._nodes.status.classList.remove('lp-klem-mode');
    this._nodes.status.innerHTML =
      '<span class="lp-naam">' + ((t.naam || 'De haak') + ' — ') + '</span>' +
      '<span class="lp-status-tekst">' + (t.instructie || 'zet elke pin op de schaarlijn') + '</span>';

  // ─── Slot-visual (pin-kolommen + haak) ───────────────────────────
  Lockpick.prototype._bouwSlot = function () {

    for (var i = 0; i < n; i++) {
      var band  = el('div', { class: 'lp-band' });
      var tick  = el('div', { class: 'lp-tick' });
      var token = el('div', { class: 'lp-pin' });
      var track = el('div', { class: 'lp-track' }, [band, tick, token]);
      tracks.appendChild(track);
      this._trackNodes.push({ track: track, band: band, tick: tick, token: token });

    slot.appendChild(tracks);
    slot.appendChild(el('div', { class: 'lp-schaar' }));           // schaarlijn-decor
    slot.appendChild(el('div', { class: 'lp-keyway' }));           // sleutelgat-decor

    for (var j = 0; j < n; j++) {

  Lockpick.prototype._zetToken = function (i, hoogte, gezet) {

  };

  // Plaats de vaste haak zo dat de punt in het slot steekt (vaste referentie,

    var refPos = 0.55;                                  // vaste hoogte, midden-ish
    var pinPx = keyway + refPos * 0.9 * trackH;

  // ─── Pin-patroon (clue-rij) ──────────────────────────────────────
  Lockpick.prototype._bouwPinnen = function () {
    var p = this._nodes.patroon; if (!p) return;
    p.innerHTML = ''; var s = this._state;
    for (var i = 0; i < this._pins.length; i++) {
      var klaar = s.gezet[i] != null, actief = i === s.pinIdx && !klaar;
      var kolom = el('div', { class: 'lp-prof-kolom' + (actief ? ' lp-actief' : '') + (klaar ? ' lp-klaar' : '') });
      kolom.appendChild(el('div', { class: 'lp-prof-vul', style: { height: (this._pins[i] * 100) + '%' } }));
      p.appendChild(kolom);
    }
  };

  Lockpick.prototype._pasUiAf = function () {
    if (!this._nodes.root) return;
    this._nodes.root.classList.toggle('lp-zonder-zone', !this.toonZone);
    this._nodes.root.classList.toggle('lp-diehard', !!this.dieHard);

  };
  Lockpick.prototype._updateReeksLabel = function () {
    if (!this._nodes.reeksLabel) return;
    var s = this._state, label = this._reeks[s.slotIdx].label || '';

  };
  Lockpick.prototype._flash = function (soort) {
    var b = this._nodes.slot;
    b.classList.remove('lp-flash-goed', 'lp-flash-laag'); void b.offsetWidth;
    b.classList.add(soort === 'goed' ? 'lp-flash-goed' : 'lp-flash-laag');
  };
  Lockpick.prototype._tijdelijkeStatus = function (tekst) {
    var st = this._nodes.statusTekst; if (!st) return;
    var orig = st.dataset.vast || st.textContent; st.dataset.vast = orig;
    st.textContent = tekst; var self = this; clearTimeout(this._statusTimer);
    this._statusTimer = setTimeout(function () { if (self._nodes.statusTekst) self._nodes.statusTekst.textContent = orig; }, 1000);
  };

  // ─── Schermen / modus / intro ────────────────────────────────────
  Lockpick.prototype._toonScreen = function (name) {
    var sc = this._nodes.screens;
    Object.keys(sc).forEach(function (k) { sc[k].classList.remove('lp-active'); });
    sc[name].classList.add('lp-active'); window.scrollTo(0, 0);
  };
  Lockpick.prototype._kiesModus = function (modus) {
    this.modus = modus; this._pasModusAf(); this._pasUiAf(); this._laadSlot(0); this._toonStart();
  };
  Lockpick.prototype._toonStart = function () {
    this._toonScreen('start');
    var t = this.config.teksten || {}, startBtn = this._nodes.startBtn;
    if (!this._introGestart && t.intro && t.intro.length) {
      this._introGestart = true;
      this._toonDialog(this._nodes.startSceneImg, t.intro, function () { if (startBtn) startBtn.style.display = ''; });
    } else if (startBtn) startBtn.style.display = '';
  };
  Lockpick.prototype._maakCompactHeader = function () {
    var self = this, children = [];
    if (this.onExit) children.push(el('button', { class: 'lp-back-btn', text: '← Terug', onclick: function () { self.onExit(); } }));
    children.push(el('div', { class: 'lp-header-sep' }));
    return el('div', { class: 'lp-header' }, children);
  };
  Lockpick.prototype._toonDialog = function (sceneEl, lines, onComplete) {
    if (!sceneEl || !lines || !lines.length) { if (onComplete) onComplete(); return; }
    var idx = 0;
    var spreker = el('div', { class: 'lp-dialog-spreker' });
    var tekst   = el('div', { class: 'lp-dialog-tekst' });
    var body    = el('div', { class: 'lp-dialog-body' }, [spreker, tekst]);
    var verderBtn = el('button', { class: 'lp-dialog-verder', title: 'Verder',
      onclick: function (e) { e.preventDefault(); e.stopPropagation(); volgende(); } }, [
      el('span', { class: 'lp-verder-ornament', text: '❧' }), el('span', { class: 'lp-verder-label', text: 'Verder' }) ]);
    var dialog = el('div', { class: 'lp-dialog' }, [body, verderBtn]);
    if (sceneEl.parentNode) sceneEl.parentNode.insertBefore(dialog, sceneEl.nextSibling);
    function toonRegel(i) {
      var r = lines[i], sp = '', tx = '';
      if (typeof r === 'string') tx = r; else if (r && typeof r === 'object') { sp = r.spreker || ''; tx = r.tekst || ''; }
      if (sp) { spreker.textContent = sp; spreker.style.display = ''; } else spreker.style.display = 'none';
      tekst.textContent = tx; tekst.style.animation = 'none'; void tekst.offsetWidth; tekst.style.animation = '';
    }
    function volgende() { idx++; if (idx >= lines.length) { if (dialog.parentNode) dialog.parentNode.removeChild(dialog); if (onComplete) onComplete(); return; } toonRegel(idx); }
    toonRegel(0);
  };
  // ─── Audio: whistle-loop + drops/mes op instelbaar interval + klik ─
  Lockpick.prototype._laadAudio = function () {
    if (typeof Audio === 'undefined') return;

    ['drops', 'mes', 'whistle', 'klik'].forEach(function (naam) {
      if (a[naam]) { try { var au = new Audio(a[naam]); au.preload = 'auto'; self._audio[naam] = au; } catch (e) {} }
    });

  };
  Lockpick.prototype._startGeluid = function () {
    if (this._audio.whistle) { this._audio.whistle.volume = this._vol.whistle; var p = this._audio.whistle.play(); if (p && p.catch) p.catch(function () {}); }
    this._planInterval('drops'); this._planInterval('mes');
  };
  Lockpick.prototype._planInterval = function (naam) {

    var wacht = Math.max(250, basis * jit);

  };
  Lockpick.prototype._speelEen = function (naam) {

  };

    var self = this;

  };
  Lockpick.prototype.setVolume = function (naam, v) {
    this._vol[naam] = clamp(v, 0, 1);

  };
  Lockpick.prototype.setIntervalMs = function (naam, ms) {

  };

  Lockpick.prototype._startMuziek = function () {
    var audio = this._nodes.audio, btn = this._nodes.musicBtn; if (!audio) return;

  };
  Lockpick.prototype.toggleMusic = function () {

  };

  // ─── Fouten-indicator (links) + sfeer-plaatsing ──────────────────
  Lockpick.prototype._updateFouten = function () {
    if (!this._nodes.foutDots) return;
    for (var i = 0; i < this._nodes.foutDots.length; i++)

  };

    var slot = this._nodes.slot; if (!slot) return;
    var cy = slot.offsetTop + slot.clientHeight / 2;

    var fb = this._nodes.foutenBox;
    if (fb) {

</script>
<script>

// Integratie-klaar: makkelijk, 3 sloten x 5 pinnen, 3 fouten = alles opnieuw, geen geluid.
const SLOTEN_CONFIG = {
  reeks: [
    { label: 'Het voorhangslot',  pins: [0.30, 0.60, 0.45, 0.75, 0.55], band: 0.15, snelheid: 1650 },
    { label: 'De celdeur',        pins: [0.55, 0.35, 0.75, 0.50, 0.65], band: 0.13, snelheid: 1500 },
    { label: "Vrouwe Roets kist", pins: [0.50, 0.80, 0.40, 0.70, 0.60], band: 0.11, snelheid: 1350 }
  ],
  dieHard: { maxFouten: 3 },   // 3 fouten -> alles opnieuw (ook in makkelijk)
  straf: 'slot',
  images: {},
  teksten: {
    titel: 'De Vleespen',
    sub: 'Peuter het slot open',
    intro: [
      'Je schuift de dunne vleespen in het slot. Ergens daarbinnen zitten de pinnen, elk op hun eigen hoogte.',
      { spreker: 'Verteller', tekst: 'Til elke pin tot precies de schaarlijn en zet hem vast. Te laag valt terug, te hoog klemt en dan valt alles.' }
    ],
    naam: 'Vleespen', instructie: 'zet elke pin op de schaarlijn',
    teLaag: 'Te laag, de pin zakt terug.',
    teHoog: 'Te hoog! De pin klemt en alle pinnen vallen terug.',
    allesOpnieuw: 'Drie keer misgegrepen. Alle sloten vallen weer dicht, begin opnieuw.',
    winAlles: { titel: 'Alle sloten open', body: 'De grendels springen terug. Wat erachter ligt, is nu van jou.' }
  }
};

let huidigLp = null;
function startDemo(){
  const mount=document.getElementById('mount');
  if(huidigLp){ try{huidigLp.destroy();}catch(e){} huidigLp=null; }
  huidigLp=new Lockpick({
    container:mount, config:SLOTEN_CONFIG,
    modus:'makkelijk',        // alleen de makkelijke versie
    testMode:true, swayAmp:17, // vleespen-beweging op 17
    showDebug:true, compactHeader:true,
    onExit:function(){ startDemo(); },
    onMislukt:function(aantal){ /* engine toont de fouten links; bij 3 -> alles opnieuw */ },
    onVoltooid:function(idx,totaal){},
    onWin:function(){}
  });
  huidigLp.mount();
  huidigLp.start();           // geen keuzescherm; direct spelen
}
startDemo();

</script>
